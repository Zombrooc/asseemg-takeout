name: Build and Measure

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  common-checks:
    name: Common Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Verify change policy
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD | node scripts/verify-change-policy.mjs
          } else {
            git diff --name-only HEAD~1 | node scripts/verify-change-policy.mjs
          }

      - name: Metro bundle check
        run: node scripts/test-harness/run-bundle-check.mjs
        timeout-minutes: 5

  tauri-linux:
    name: Tauri Build + Rust Tests (Linux)
    runs-on: ubuntu-latest
    needs: common-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Rust
        run: cargo test --manifest-path apps/web/src-tauri/Cargo.toml

      - name: Build Tauri desktop
        run: pnpm --filter web run desktop:build

      - name: Generate build manifest
        run: pnpm run build:manifest

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: build-manifest.json

  tauri-windows-smoke:
    name: Tauri Smoke (Windows)
    runs-on: windows-latest
    needs: common-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust toolchain smoke
        run: cargo --version

      - name: Tauri CLI smoke
        run: pnpm --filter web run tauri -- --version
