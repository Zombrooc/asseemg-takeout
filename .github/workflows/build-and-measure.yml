name: Build and Measure

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-measure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml', '**/.turbo/**') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache Cargo (desktop target)
        uses: actions/cache@v4
        with:
          path: dist/desktop/target
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('apps/web/src-tauri/Cargo.lock', 'apps/web/src-tauri/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check types
        run: pnpm run check-types

      - name: Test native
        run: pnpm --filter native run test

      - name: Test Rust
        run: cargo test --manifest-path apps/web/src-tauri/Cargo.toml

      - name: Generate build manifest
        run: pnpm run build:manifest

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: build-manifest.json
